<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Garbage Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .user-info {
            color: #555;
            font-weight: 500;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 5px;
            font-size: 14px;
            transition: border 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .auth-container {
            max-width: 400px;
            margin: 50px auto;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: #f3f4f6;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .hidden {
            display: none !important;
        }

        .complaint-card {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .complaint-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .complaint-id {
            font-weight: 700;
            color: #667eea;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-assigned {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }

        .complaint-details {
            color: #555;
            line-height: 1.6;
        }

        .complaint-meta {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }

        .complaint-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Authentication Section -->
        <div id="authSection" class="auth-container">
            <div class="card">
                <h1 style="text-align: center; color: #667eea; margin-bottom: 30px;">🗑️ Garbage Management</h1>
                
                <div class="tab-container">
                    <button class="tab active" onclick="switchAuthTab('login')">Login</button>
                    <button class="tab" onclick="switchAuthTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                    <p style="text-align: center; margin-top: 15px; color: #666; font-size: 13px;">
                        Admin login: admin@garbage.com / admin123
                    </p>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="hidden">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="regPhone" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
                </form>
            </div>
        </div>

        <!-- User Dashboard -->
        <div id="userDashboard" class="hidden">
            <div class="header">
                <h1>Citizen Dashboard</h1>
                <div class="header-actions">
                    <span class="user-info" id="userName"></span>
                    <button class="btn btn-secondary" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="grid-2">
                <div class="card">
                    <h2 style="margin-bottom: 20px; color: #333;">Report New Complaint</h2>
                    <form id="complaintForm">
                        <div class="form-group">
                            <label>Complaint Type</label>
                            <select id="complaintType" required>
                                <option value="">Select Type</option>
                                <option value="Overflowing Bin">Overflowing Bin</option>
                                <option value="Illegal Dumping">Illegal Dumping</option>
                                <option value="Missed Collection">Missed Collection</option>
                                <option value="Broken Bin">Broken Bin</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="complaintLocation" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="complaintDescription" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success" style="width: 100%;">Submit Complaint</button>
                    </form>
                </div>

                <div class="card">
                    <h2 style="margin-bottom: 20px; color: #333;">My Complaints</h2>
                    <div id="userComplaints"></div>
                </div>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="hidden">
            <div class="header">
                <h1>Admin Dashboard</h1>
                <div class="header-actions">
                    <span class="user-info">Administrator</span>
                    <button class="btn btn-secondary" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalComplaints">0</div>
                    <div class="stat-label">Total Complaints</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingComplaints">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="assignedComplaints">0</div>
                    <div class="stat-label">Assigned</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedComplaints">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>

            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">All Complaints</h2>
                <div id="adminComplaints"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialize default admin account
        function initializeSystem() {
            if (!localStorage.getItem('users')) {
                const defaultUsers = [
                    {
                        email: 'admin@garbage.com',
                        password: 'admin123',
                        name: 'System Administrator',
                        role: 'admin'
                    }
                ];
                localStorage.setItem('users', JSON.stringify(defaultUsers));
            }
            if (!localStorage.getItem('complaints')) {
                localStorage.setItem('complaints', JSON.stringify([]));
            }
        }

        // Auth functions
        function switchAuthTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                showDashboard(user.role);
            } else {
                alert('Invalid credentials!');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newUser = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPassword').value,
                role: 'user'
            };
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.email === newUser.email)) {
                alert('Email already registered!');
                return;
            }
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            alert('Registration successful! Please login.');
            switchAuthTab('login');
            document.getElementById('registerForm').reset();
        });

        function showDashboard(role) {
            document.getElementById('authSection').classList.add('hidden');
            if (role === 'admin') {
                document.getElementById('adminDashboard').classList.remove('hidden');
                loadAdminDashboard();
            } else {
                document.getElementById('userDashboard').classList.remove('hidden');
                loadUserDashboard();
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('userDashboard').classList.add('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('loginForm').reset();
        }

        // User Dashboard
        function loadUserDashboard() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            document.getElementById('userName').textContent = user.name;
            loadUserComplaints();
        }

        document.getElementById('complaintForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            
            const newComplaint = {
                id: 'CMP' + Date.now(),
                userId: user.email,
                userName: user.name,
                type: document.getElementById('complaintType').value,
                location: document.getElementById('complaintLocation').value,
                description: document.getElementById('complaintDescription').value,
                status: 'pending',
                date: new Date().toLocaleString(),
                assignedTo: null
            };
            
            complaints.push(newComplaint);
            localStorage.setItem('complaints', JSON.stringify(complaints));
            alert('Complaint submitted successfully!');
            this.reset();
            loadUserComplaints();
        });

        function loadUserComplaints() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            const userComplaints = complaints.filter(c => c.userId === user.email);
            
            const container = document.getElementById('userComplaints');
            if (userComplaints.length === 0) {
                container.innerHTML = '<p style="color: #999;">No complaints yet.</p>';
                return;
            }
            
            container.innerHTML = userComplaints.map(c => `
                <div class="complaint-card">
                    <div class="complaint-header">
                        <span class="complaint-id">${c.id}</span>
                        <span class="status-badge status-${c.status}">${c.status.toUpperCase()}</span>
                    </div>
                    <div class="complaint-details">
                        <strong>${c.type}</strong> - ${c.location}<br>
                        ${c.description}
                    </div>
                    <div class="complaint-meta">
                        <span>📅 ${c.date}</span>
                        ${c.assignedTo ? `<span>👷 Assigned to: ${c.assignedTo}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Admin Dashboard
        function loadAdminDashboard() {
            updateStats();
            loadAdminComplaints();
        }

        function updateStats() {
            const complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            document.getElementById('totalComplaints').textContent = complaints.length;
            document.getElementById('pendingComplaints').textContent = complaints.filter(c => c.status === 'pending').length;
            document.getElementById('assignedComplaints').textContent = complaints.filter(c => c.status === 'assigned').length;
            document.getElementById('completedComplaints').textContent = complaints.filter(c => c.status === 'completed').length;
        }

        function loadAdminComplaints() {
            const complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            const container = document.getElementById('adminComplaints');
            
            if (complaints.length === 0) {
                container.innerHTML = '<p style="color: #999;">No complaints to display.</p>';
                return;
            }
            
            container.innerHTML = complaints.map(c => `
                <div class="complaint-card">
                    <div class="complaint-header">
                        <div>
                            <span class="complaint-id">${c.id}</span>
                            <span style="color: #666; font-size: 14px; margin-left: 10px;">by ${c.userName}</span>
                        </div>
                        <span class="status-badge status-${c.status}">${c.status.toUpperCase()}</span>
                    </div>
                    <div class="complaint-details">
                        <strong>${c.type}</strong> - ${c.location}<br>
                        ${c.description}
                    </div>
                    <div class="complaint-meta">
                        <span>📅 ${c.date}</span>
                        ${c.assignedTo ? `<span>👷 ${c.assignedTo}</span>` : ''}
                    </div>
                    <div class="complaint-actions">
                        ${c.status === 'pending' ? `
                            <button class="btn btn-primary" onclick="assignComplaint('${c.id}')">Assign</button>
                        ` : ''}
                        ${c.status === 'assigned' ? `
                            <button class="btn btn-success" onclick="completeComplaint('${c.id}')">Mark Complete</button>
                        ` : ''}
                        <button class="btn btn-danger" onclick="deleteComplaint('${c.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function assignComplaint(id) {
            const worker = prompt('Enter worker/team name:');
            if (!worker) return;
            
            const complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            const complaint = complaints.find(c => c.id === id);
            if (complaint) {
                complaint.status = 'assigned';
                complaint.assignedTo = worker;
                localStorage.setItem('complaints', JSON.stringify(complaints));
                loadAdminDashboard();
            }
        }

        function completeComplaint(id) {
            const complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            const complaint = complaints.find(c => c.id === id);
            if (complaint) {
                complaint.status = 'completed';
                localStorage.setItem('complaints', JSON.stringify(complaints));
                loadAdminDashboard();
            }
        }

        function deleteComplaint(id) {
            if (!confirm('Are you sure you want to delete this complaint?')) return;
            
            let complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            complaints = complaints.filter(c => c.id !== id);
            localStorage.setItem('complaints', JSON.stringify(complaints));
            loadAdminDashboard();
        }

        // Check if user is already logged in
        window.onload = function() {
            initializeSystem();
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                showDashboard(user.role);
            }
        };
    </script>
</body>
</html>
